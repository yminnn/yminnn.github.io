<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="160" fill="#111111"/>
  
  <!-- 神经元 -->
  <circle cx="70" cy="80" r="15" fill="#222222" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="70" cy="80" r="4" fill="#ff3333"/>
  
  <!-- 神经网络连接 -->
  <line x1="85" y1="80" x2="125" y2="60" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="85" y1="80" x2="125" y2="100" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,2"/>
  
  <!-- 事件数据点 -->
  <g transform="translate(130, 45)">
    <rect width="40" height="5" fill="#ff3333"/>
    <rect width="40" height="5" y="15" fill="#ff3333"/>
    <rect width="40" height="5" y="30" fill="#ff3333"/>
    <rect width="40" height="5" y="45" fill="#ff3333"/>
    <rect width="40" height="5" y="60" fill="#ff3333"/>
  </g>
  
  <!-- 压缩箭头 -->
  <path d="M180,80 L200,80 L195,75 L200,80 L195,85" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- 压缩数据 -->
  <g transform="translate(210, 70)">
    <rect width="20" height="5" fill="#ff3333"/>
    <rect width="20" height="5" y="15" fill="#ff3333"/>
  </g>
  
  <!-- 数据减少标注 -->
  <text x="210" y="50" font-family="Arial" font-size="10" fill="#ffffff">11× Data</text>
  <text x="210" y="62" font-family="Arial" font-size="10" fill="#ffffff">Reduction</text>
</svg> 