<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #111111; }
    .text-color { fill: #ffffff; }
    .box-bg { fill: #222222; }
    .module-bg { fill: #333333; }
    .brain-bg { fill: #333333; }
    :root[data-theme='light'] .bg { fill: #f5f5f5; }
    :root[data-theme='light'] .text-color { fill: #333333; }
    :root[data-theme='light'] .box-bg { fill: #ffffff; }
    :root[data-theme='light'] .module-bg { fill: #ffffff; }
    :root[data-theme='light'] .brain-bg { fill: #f0f0f0; }
    
    .stroke-color { stroke: #ffffff; }
    :root[data-theme='light'] .stroke-color { stroke: #333333; }
    
    .dash-stroke { stroke: #ffffff; }
    :root[data-theme='light'] .dash-stroke { stroke: #666666; }
    
    .red-signal { stroke: #ff5555; }
    :root[data-theme='light'] .red-signal { stroke: #ff5555; opacity: 0.9; }
  </style>
  
  <!-- 背景 -->
  <rect width="300" height="160" class="bg"/>
  
  <!-- 头部轮廓 -->
  <path d="M80,40 C120,10 180,10 220,40 C240,60 240,100 220,120 C180,150 120,150 80,120 C60,100 60,60 80,40 Z" 
        class="box-bg stroke-color" stroke-width="1.5"/>
  
  <!-- 大脑轮廓 -->
  <path d="M100,50 C130,30 170,30 200,50 C215,65 215,95 200,110 C170,130 130,130 100,110 C85,95 85,65 100,50 Z" 
        class="brain-bg dash-stroke" stroke-width="1.5" stroke-dasharray="2,2"/>
  
  <!-- 发射器 TX1 -->
  <circle cx="130" cy="70" r="8" fill="#ff3333"/>
  <text x="125" y="58" font-family="Arial" font-size="8" class="text-color">TX1</text>
  
  <!-- 发射器 TX2 -->
  <circle cx="170" cy="70" r="8" fill="#ff3333"/>
  <text x="165" y="58" font-family="Arial" font-size="8" class="text-color">TX2</text>
  
  <!-- 接收器 RX1 -->
  <rect x="120" y="100" width="12" height="12" class="module-bg stroke-color" stroke-width="1.5"/>
  <text x="115" y="125" font-family="Arial" font-size="8" class="text-color">RX1</text>
  
  <!-- 接收器 RX2 -->
  <rect x="144" y="100" width="12" height="12" class="module-bg stroke-color" stroke-width="1.5"/>
  <text x="139" y="125" font-family="Arial" font-size="8" class="text-color">RX2</text>
  
  <!-- 接收器 RX3 -->
  <rect x="168" y="100" width="12" height="12" class="module-bg stroke-color" stroke-width="1.5"/>
  <text x="163" y="125" font-family="Arial" font-size="8" class="text-color">RX3</text>
  
  <!-- 信号路径 -->
  <path d="M130,78 C130,90 126,95 126,100" fill="none" class="red-signal" stroke-width="1" stroke-dasharray="1,1"/>
  <path d="M130,78 C135,90 150,95 150,100" fill="none" class="red-signal" stroke-width="1" stroke-dasharray="1,1"/>
  <path d="M170,78 C170,90 174,95 174,100" fill="none" class="red-signal" stroke-width="1" stroke-dasharray="1,1"/>
  <path d="M170,78 C165,90 150,95 150,100" fill="none" class="red-signal" stroke-width="1" stroke-dasharray="1,1"/>
</svg> 