<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="160" fill="#111111"/>
  
  <!-- 心脏轮廓 -->
  <path d="M120,55 C100,35 70,50 70,75 C70,100 100,120 150,140 C200,120 230,100 230,75 C230,50 200,35 180,55 C160,35 140,35 120,55 Z" 
        fill="#222222" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- 传感器节点 -->
  <circle cx="100" cy="75" r="6" fill="#ff3333"/>
  <circle cx="150" cy="75" r="6" fill="#ff3333"/>
  <circle cx="200" cy="75" r="6" fill="#ff3333"/>
  
  <!-- 数据连接 -->
  <line x1="100" y1="75" x2="120" y2="50" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="150" y1="75" x2="150" y2="50" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="200" y1="75" x2="180" y2="50" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
  
  <!-- 神经脉冲 -->
  <g transform="translate(120, 35)">
    <rect width="10" height="3" fill="#ff3333"/>
    <rect width="10" height="3" x="20" fill="#ff3333"/>
    <rect width="10" height="3" x="40" fill="#ff3333"/>
  </g>
  
  <!-- SNN 计算单元 -->
  <rect x="120" y="20" width="60" height="25" rx="3" fill="#333333" stroke="#ffffff" stroke-width="1.5"/>
  <text x="130" y="35" font-family="Arial" font-size="8" fill="#ffffff">SNN Compute</text>
  
  <!-- 事件驱动路径 -->
  <path d="M150,20 L150,10 L250,10 L250,80 L220,80" fill="none" stroke="#ff3333" stroke-width="1.5" stroke-dasharray="2,2"/>
  <circle cx="250" cy="80" r="5" fill="#ff3333"/>
  
  <!-- 标签 -->
  <text x="230" y="95" font-family="Arial" font-size="8" fill="#ffffff">Event-Driven</text>
  <text x="225" y="105" font-family="Arial" font-size="8" fill="#ffffff">Communication</text>
</svg> 