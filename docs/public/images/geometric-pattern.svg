<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dark { display: block; }
      .light { display: none; }
      :root[data-theme='light'] .dark { display: none; }
      :root[data-theme='light'] .light { display: block; }
    </style>
  </defs>

  <!-- 深色模式 -->
  <g class="dark">
    <!-- Background -->
    <rect width="400" height="200" fill="#111111"/>
    
    <!-- Geometric Patterns -->
    <g opacity="0.9">
      <!-- Grid Pattern -->
      <g opacity="0.7">
        <!-- Vertical lines -->
        <line x1="50" y1="0" x2="50" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="100" y1="0" x2="100" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="150" y1="0" x2="150" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="200" y1="0" x2="200" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="250" y1="0" x2="250" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="300" y1="0" x2="300" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="350" y1="0" x2="350" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        
        <!-- Horizontal lines -->
        <line x1="0" y1="40" x2="400" y2="40" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="80" x2="400" y2="80" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
      </g>
      
      <!-- Red Shapes -->
      <rect x="80" y="30" width="40" height="40" fill="#ff0000" opacity="0.9"/>
      <rect x="230" y="70" width="30" height="30" fill="#ff0000" opacity="0.8"/>
      <rect x="320" y="130" width="20" height="20" fill="#ff0000" opacity="0.7"/>
      
      <!-- Triangles -->
      <polygon points="180,20 210,60 150,60" fill="#ff0000" opacity="0.6"/>
      <polygon points="260,130 290,150 260,170" fill="#ff0000" opacity="0.5"/>
      
      <!-- Circles -->
      <circle cx="50" cy="140" r="25" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.8"/>
      <circle cx="130" cy="100" r="15" stroke="#ff0000" stroke-width="2" fill="none" opacity="0.7"/>
      <circle cx="350" cy="50" r="20" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
      
      <!-- White rectangles -->
      <rect x="150" y="130" width="30" height="10" fill="#ffffff" opacity="0.9"/>
      <rect x="150" y="145" width="20" height="10" fill="#ffffff" opacity="0.8"/>
      <rect x="150" y="160" width="40" height="10" fill="#ffffff" opacity="0.7"/>
    </g>
  </g>

  <!-- 浅色模式 -->
  <g class="light">
    <!-- Background -->
    <rect width="400" height="200" fill="transparent"/>
    
    <!-- Geometric Patterns -->
    <g opacity="0.9">
      <!-- Grid Pattern -->
      <g opacity="0.7">
        <!-- Vertical lines -->
        <line x1="50" y1="0" x2="50" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="100" y1="0" x2="100" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="150" y1="0" x2="150" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="200" y1="0" x2="200" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="250" y1="0" x2="250" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="300" y1="0" x2="300" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="350" y1="0" x2="350" y2="200" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        
        <!-- Horizontal lines -->
        <line x1="0" y1="40" x2="400" y2="40" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="80" x2="400" y2="80" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="120" x2="400" y2="120" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
        <line x1="0" y1="160" x2="400" y2="160" stroke="#000000" stroke-width="0.5" opacity="0.3"/>
      </g>
      
      <!-- Red Shapes -->
      <rect x="80" y="30" width="40" height="40" fill="#ff0000" opacity="0.9"/>
      <rect x="230" y="70" width="30" height="30" fill="#ff0000" opacity="0.8"/>
      <rect x="320" y="130" width="20" height="20" fill="#ff0000" opacity="0.7"/>
      
      <!-- Triangles -->
      <polygon points="180,20 210,60 150,60" fill="#ff0000" opacity="0.6"/>
      <polygon points="260,130 290,150 260,170" fill="#ff0000" opacity="0.5"/>
      
      <!-- Circles -->
      <circle cx="50" cy="140" r="25" stroke="#000000" stroke-width="1" fill="none" opacity="0.8"/>
      <circle cx="130" cy="100" r="15" stroke="#ff0000" stroke-width="2" fill="none" opacity="0.7"/>
      <circle cx="350" cy="50" r="20" stroke="#000000" stroke-width="1" fill="none" opacity="0.6"/>
      
      <!-- Black rectangles -->
      <rect x="150" y="130" width="30" height="10" fill="#000000" opacity="0.9"/>
      <rect x="150" y="145" width="20" height="10" fill="#000000" opacity="0.8"/>
      <rect x="150" y="160" width="40" height="10" fill="#000000" opacity="0.7"/>
    </g>
  </g>
</svg> 