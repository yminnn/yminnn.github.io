<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dark { display: block; }
      .light { display: none; }
      :root[data-theme='light'] .dark { display: none; }
      :root[data-theme='light'] .light { display: block; }
    </style>
  </defs>
  
  <!-- 深色模式 -->
  <g class="dark">
    <!-- Background -->
    <rect width="400" height="200" fill="#111111"/>
    
    <!-- Abstract patterns -->
    <g opacity="0.9">
      <!-- Horizontal lines with varying opacity -->
      <line x1="20" y1="30" x2="380" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="60" x2="380" y2="60" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
      <line x1="20" y1="90" x2="380" y2="90" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
      <line x1="20" y1="120" x2="380" y2="120" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
      <line x1="20" y1="150" x2="380" y2="150" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
      <line x1="20" y1="180" x2="380" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
      
      <!-- Red circles in a pattern -->
      <circle cx="50" cy="40" r="15" fill="#ff3333" opacity="0.8"/>
      <circle cx="130" cy="100" r="10" fill="#ff3333" opacity="0.7"/>
      <circle cx="200" cy="60" r="20" fill="#ff3333" opacity="0.9"/>
      <circle cx="300" cy="130" r="12" fill="#ff3333" opacity="0.6"/>
      <circle cx="350" cy="80" r="8" fill="#ff3333" opacity="0.7"/>
      
      <!-- White dots pattern -->
      <circle cx="80" cy="170" r="4" fill="#ffffff" opacity="0.7"/>
      <circle cx="120" cy="150" r="3" fill="#ffffff" opacity="0.8"/>
      <circle cx="160" cy="130" r="2" fill="#ffffff" opacity="0.9"/>
      <circle cx="200" cy="110" r="5" fill="#ffffff" opacity="0.7"/>
      <circle cx="240" cy="150" r="3" fill="#ffffff" opacity="0.8"/>
      <circle cx="280" cy="170" r="2" fill="#ffffff" opacity="0.9"/>
      <circle cx="320" cy="130" r="4" fill="#ffffff" opacity="0.8"/>
      
      <!-- Diagonal lines -->
      <line x1="30" y1="20" x2="100" y2="90" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
      <line x1="280" y1="30" x2="350" y2="100" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
      <line x1="220" y1="140" x2="270" y2="190" stroke="#ff3333" stroke-width="2" opacity="0.7"/>
    </g>
  </g>
  
  <!-- 浅色模式 -->
  <g class="light">
    <!-- Background -->
    <rect width="400" height="200" fill="transparent"/>
    
    <!-- Abstract patterns -->
    <g opacity="0.9">
      <!-- Horizontal lines with varying opacity -->
      <line x1="20" y1="30" x2="380" y2="30" stroke="#000000" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="60" x2="380" y2="60" stroke="#000000" stroke-width="1" opacity="0.3"/>
      <line x1="20" y1="90" x2="380" y2="90" stroke="#000000" stroke-width="1" opacity="0.7"/>
      <line x1="20" y1="120" x2="380" y2="120" stroke="#000000" stroke-width="1" opacity="0.4"/>
      <line x1="20" y1="150" x2="380" y2="150" stroke="#000000" stroke-width="1" opacity="0.6"/>
      <line x1="20" y1="180" x2="380" y2="180" stroke="#000000" stroke-width="1" opacity="0.2"/>
      
      <!-- Red circles in a pattern -->
      <circle cx="50" cy="40" r="15" fill="#ff3333" opacity="0.8"/>
      <circle cx="130" cy="100" r="10" fill="#ff3333" opacity="0.7"/>
      <circle cx="200" cy="60" r="20" fill="#ff3333" opacity="0.9"/>
      <circle cx="300" cy="130" r="12" fill="#ff3333" opacity="0.6"/>
      <circle cx="350" cy="80" r="8" fill="#ff3333" opacity="0.7"/>
      
      <!-- Black dots pattern -->
      <circle cx="80" cy="170" r="4" fill="#000000" opacity="0.7"/>
      <circle cx="120" cy="150" r="3" fill="#000000" opacity="0.8"/>
      <circle cx="160" cy="130" r="2" fill="#000000" opacity="0.9"/>
      <circle cx="200" cy="110" r="5" fill="#000000" opacity="0.7"/>
      <circle cx="240" cy="150" r="3" fill="#000000" opacity="0.8"/>
      <circle cx="280" cy="170" r="2" fill="#000000" opacity="0.9"/>
      <circle cx="320" cy="130" r="4" fill="#000000" opacity="0.8"/>
      
      <!-- Diagonal lines -->
      <line x1="30" y1="20" x2="100" y2="90" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
      <line x1="280" y1="30" x2="350" y2="100" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
      <line x1="220" y1="140" x2="270" y2="190" stroke="#ff3333" stroke-width="2" opacity="0.7"/>
    </g>
  </g>
</svg> 