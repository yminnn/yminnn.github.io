<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dark { display: block; }
      .light { display: none; }
      :root[data-theme='light'] .dark { display: none; }
      :root[data-theme='light'] .light { display: block; }
    </style>
  </defs>
  
  <!-- 深色模式 -->
  <g class="dark">
    <!-- Background -->
    <rect width="400" height="200" fill="#111111"/>
    
    <!-- Data Visualization Elements -->
    <g>
      <!-- Axes -->
      <line x1="50" y1="150" x2="350" y2="150" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="50" y1="30" x2="50" y2="150" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Axis Labels -->
      <text x="200" y="180" font-family="Inter, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Time Period</text>
      <text x="20" y="90" font-family="Inter, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" transform="rotate(-90 20,90)">Measurements</text>
      
      <!-- Grid Lines -->
      <g opacity="0.2">
        <line x1="50" y1="120" x2="350" y2="120" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="50" y1="90" x2="350" y2="90" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="50" y1="60" x2="350" y2="60" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="100" y1="30" x2="100" y2="150" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="150" y1="30" x2="150" y2="150" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="200" y1="30" x2="200" y2="150" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="250" y1="30" x2="250" y2="150" stroke="#ffffff" stroke-width="0.5"/>
        <line x1="300" y1="30" x2="300" y2="150" stroke="#ffffff" stroke-width="0.5"/>
      </g>
      
      <!-- Data Series -->
      <!-- Line Series -->
      <polyline 
        points="50,110 100,95 150,105 200,70 250,55 300,45 350,65" 
        stroke="#ffffff" 
        stroke-width="2" 
        fill="none"
      />
      
      <!-- Bar Series -->
      <rect x="65" y="120" width="20" height="30" fill="#ff3333" opacity="0.8"/>
      <rect x="115" y="100" width="20" height="50" fill="#ff3333" opacity="0.8"/>
      <rect x="165" y="110" width="20" height="40" fill="#ff3333" opacity="0.8"/>
      <rect x="215" y="80" width="20" height="70" fill="#ff3333" opacity="0.8"/>
      <rect x="265" y="60" width="20" height="90" fill="#ff3333" opacity="0.8"/>
      <rect x="315" y="70" width="20" height="80" fill="#ff3333" opacity="0.8"/>
      
      <!-- Data Points -->
      <circle cx="50" cy="110" r="4" fill="#ffffff"/>
      <circle cx="100" cy="95" r="4" fill="#ffffff"/>
      <circle cx="150" cy="105" r="4" fill="#ffffff"/>
      <circle cx="200" cy="70" r="4" fill="#ffffff"/>
      <circle cx="250" cy="55" r="4" fill="#ffffff"/>
      <circle cx="300" cy="45" r="4" fill="#ffffff"/>
      <circle cx="350" cy="65" r="4" fill="#ffffff"/>
      
      <!-- Legend -->
      <rect x="280" y="20" width="10" height="10" fill="#ff3333" opacity="0.8"/>
      <text x="295" y="29" font-family="Inter, sans-serif" font-size="9" fill="#ffffff">Series A</text>
      
      <line x1="280" y1="40" x2="290" y2="40" stroke="#ffffff" stroke-width="2"/>
      <circle cx="285" cy="40" r="3" fill="#ffffff"/>
      <text x="295" y="43" font-family="Inter, sans-serif" font-size="9" fill="#ffffff">Series B</text>
    </g>
  </g>
  
  <!-- 浅色模式 -->
  <g class="light">
    <!-- Background -->
    <rect width="400" height="200" fill="transparent"/>
    
    <!-- Data Visualization Elements -->
    <g>
      <!-- Axes -->
      <line x1="50" y1="150" x2="350" y2="150" stroke="#000000" stroke-width="1.5"/>
      <line x1="50" y1="30" x2="50" y2="150" stroke="#000000" stroke-width="1.5"/>
      
      <!-- Axis Labels -->
      <text x="200" y="180" font-family="Inter, sans-serif" font-size="10" fill="#000000" text-anchor="middle">Time Period</text>
      <text x="20" y="90" font-family="Inter, sans-serif" font-size="10" fill="#000000" text-anchor="middle" transform="rotate(-90 20,90)">Measurements</text>
      
      <!-- Grid Lines -->
      <g opacity="0.2">
        <line x1="50" y1="120" x2="350" y2="120" stroke="#000000" stroke-width="0.5"/>
        <line x1="50" y1="90" x2="350" y2="90" stroke="#000000" stroke-width="0.5"/>
        <line x1="50" y1="60" x2="350" y2="60" stroke="#000000" stroke-width="0.5"/>
        <line x1="100" y1="30" x2="100" y2="150" stroke="#000000" stroke-width="0.5"/>
        <line x1="150" y1="30" x2="150" y2="150" stroke="#000000" stroke-width="0.5"/>
        <line x1="200" y1="30" x2="200" y2="150" stroke="#000000" stroke-width="0.5"/>
        <line x1="250" y1="30" x2="250" y2="150" stroke="#000000" stroke-width="0.5"/>
        <line x1="300" y1="30" x2="300" y2="150" stroke="#000000" stroke-width="0.5"/>
      </g>
      
      <!-- Data Series -->
      <!-- Line Series -->
      <polyline 
        points="50,110 100,95 150,105 200,70 250,55 300,45 350,65" 
        stroke="#000000" 
        stroke-width="2" 
        fill="none"
      />
      
      <!-- Bar Series -->
      <rect x="65" y="120" width="20" height="30" fill="#ff3333" opacity="0.8"/>
      <rect x="115" y="100" width="20" height="50" fill="#ff3333" opacity="0.8"/>
      <rect x="165" y="110" width="20" height="40" fill="#ff3333" opacity="0.8"/>
      <rect x="215" y="80" width="20" height="70" fill="#ff3333" opacity="0.8"/>
      <rect x="265" y="60" width="20" height="90" fill="#ff3333" opacity="0.8"/>
      <rect x="315" y="70" width="20" height="80" fill="#ff3333" opacity="0.8"/>
      
      <!-- Data Points -->
      <circle cx="50" cy="110" r="4" fill="#000000"/>
      <circle cx="100" cy="95" r="4" fill="#000000"/>
      <circle cx="150" cy="105" r="4" fill="#000000"/>
      <circle cx="200" cy="70" r="4" fill="#000000"/>
      <circle cx="250" cy="55" r="4" fill="#000000"/>
      <circle cx="300" cy="45" r="4" fill="#000000"/>
      <circle cx="350" cy="65" r="4" fill="#000000"/>
      
      <!-- Legend -->
      <rect x="280" y="20" width="10" height="10" fill="#ff3333" opacity="0.8"/>
      <text x="295" y="29" font-family="Inter, sans-serif" font-size="9" fill="#000000">Series A</text>
      
      <line x1="280" y1="40" x2="290" y2="40" stroke="#000000" stroke-width="2"/>
      <circle cx="285" cy="40" r="3" fill="#000000"/>
      <text x="295" y="43" font-family="Inter, sans-serif" font-size="9" fill="#000000">Series B</text>
    </g>
  </g>
</svg> 