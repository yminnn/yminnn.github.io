<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #111111; }
    .text-color { fill: #ffffff; }
    .box-bg { fill: #222222; }
    :root[data-theme='light'] .bg { fill: #f5f5f5; }
    :root[data-theme='light'] .text-color { fill: #333333; }
    :root[data-theme='light'] .box-bg { fill: #ffffff; }
    
    .stroke-color { stroke: #ffffff; }
    :root[data-theme='light'] .stroke-color { stroke: #333333; }
  </style>
  
  <!-- 背景 -->
  <rect width="300" height="160" class="bg"/>
  
  <!-- 频率范围 -->
  <line x1="50" y1="100" x2="250" y2="100" class="stroke-color" stroke-width="1.5"/>
  <line x1="50" y1="95" x2="50" y2="105" class="stroke-color" stroke-width="1.5"/>
  <line x1="250" y1="95" x2="250" y2="105" class="stroke-color" stroke-width="1.5"/>
  <text x="40" y="120" font-family="Arial" font-size="10" class="text-color">3GHz</text>
  <text x="240" y="120" font-family="Arial" font-size="10" class="text-color">10GHz</text>
  
  <!-- UWB脉冲 -->
  <g transform="translate(130, 70)">
    <path d="M-60,20 L-50,20 L-48,15 L-46,25 L-44,15 L-42,25 L-40,20 L-30,20" fill="none" stroke="#ff3333" stroke-width="1.5"/>
    <path d="M-20,20 L-10,20 L-8,15 L-6,25 L-4,15 L-2,25 L0,20 L10,20" fill="none" stroke="#ff3333" stroke-width="1.5"/>
    <path d="M20,20 L30,20 L32,15 L34,25 L36,15 L38,25 L40,20 L50,20" fill="none" stroke="#ff3333" stroke-width="1.5"/>
  </g>
  
  <!-- 收发器框图 -->
  <rect x="100" y="30" width="100" height="30" rx="3" class="box-bg stroke-color" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="150" y2="60" class="stroke-color" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="110" y="45" font-family="Arial" font-size="8" fill="#ff3333">TX</text>
  <text x="170" y="45" font-family="Arial" font-size="8" fill="#ff3333">RX</text>
  <text x="125" y="25" font-family="Arial" font-size="10" class="text-color">IR-UWB Transceiver</text>
  
  <!-- 天线 -->
  <path d="M200,45 L220,45 L220,30 L235,45 L220,60 L220,45" fill="none" class="stroke-color" stroke-width="1.5"/>
  
  <!-- IEEE 标准 -->
  <text x="90" y="140" font-family="Arial" font-size="10" class="text-color">IEEE 802.15.4a/z</text>
  
  <!-- 功耗标记 -->
  <g transform="translate(20, 40)">
    <rect width="60" height="40" rx="3" class="box-bg" stroke="#ff3333" stroke-width="1.5"/>
    <text x="10" y="15" font-family="Arial" font-size="8" class="text-color">TX: 8.9 mW</text>
    <text x="10" y="30" font-family="Arial" font-size="8" class="text-color">RX: 21.5 mW</text>
  </g>
</svg> 