<svg width="300" height="160" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="160" fill="#111111"/>
  
  <!-- 传感器 -->
  <rect x="140" y="30" width="20" height="40" rx="2" fill="#333333" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="145" y="35" width="10" height="30" rx="1" fill="#ff3333"/>
  
  <!-- 波导 -->
  <rect x="130" y="70" width="40" height="10" fill="#333333" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- 超声波 -->
  <path d="M150,80 
           C160,100 180,100 190,80 
           C200,60 220,60 230,80" 
        fill="none" stroke="#66ccff" stroke-width="1.5"/>
  
  <path d="M150,80 
           C140,100 120,100 110,80 
           C100,60 80,60 70,80" 
        fill="none" stroke="#66ccff" stroke-width="1.5"/>
  
  <!-- 功率标记 -->
  <path d="M240,80 L255,80 L250,75 L255,80 L250,85" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text x="260" y="84" font-family="Arial" font-size="8" fill="#ffffff">Power</text>
  
  <!-- 效率文字 -->
  <text x="224" y="120" font-family="Arial" font-size="14" fill="#ff3333">69%</text>
  <text x="210" y="135" font-family="Arial" font-size="8" fill="#ffffff">Efficiency</text>
  
  <!-- 实验结果标记 -->
  <line x1="40" y1="90" x2="80" y2="90" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="40" y1="110" x2="80" y2="110" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="40" y1="90" x2="40" y2="110" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="80" y1="90" x2="80" y2="110" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  
  <text x="30" y="130" font-family="Arial" font-size="8" fill="#ffffff">Adiabatic Drive</text>
  <text x="43" y="102" font-family="Arial" font-size="7" fill="#ff3333">GCR</text>
</svg> 